<svg width="120" height="120" viewBox="0 0 120 120"
    xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="symfonyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#20c997;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0dcaf0;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background circle -->
    <circle cx="60" cy="60" r="55" fill="url(#symfonyGradient)" stroke="#fff" stroke-width="3"/>

    <!-- Symfony logo simplified -->
    <g transform="translate(35, 35)">
        <!-- S shape -->
        <path d="M15 15 Q25 5, 35 15 Q45 25, 35 35 Q25 45, 15 35 Q5 25, 15 15" fill="white" stroke="none"/>
        <!-- Additional decorative elements -->
        <circle cx="25" cy="25" r="3" fill="rgba(255,255,255,0.8)"/>
        <circle cx="35" cy="40" r="2" fill="rgba(255,255,255,0.6)"/>
        <circle cx="15" cy="40" r="2" fill="rgba(255,255,255,0.6)"/>
    </g>

    <!-- Bottom text -->
    <text x="60" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">SYMFONY</text>
</svg>
