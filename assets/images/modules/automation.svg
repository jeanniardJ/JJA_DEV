<svg width="120" height="120" viewBox="0 0 120 120"
    xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="automationGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6f42c1;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0d6efd;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background circle -->
    <circle cx="60" cy="60" r="55" fill="url(#automationGradient)" stroke="#fff" stroke-width="3"/>

    <!-- Gear/automation icon -->
    <g transform="translate(60, 60)">
        <!-- Main gear -->
        <g>
            <circle cx="0" cy="0" r="20" fill="white"/>
            <circle cx="0" cy="0" r="8" fill="url(#automationGradient)"/>
            <!-- Gear teeth -->
            <rect x="-2" y="-25" width="4" height="8" fill="white"/>
            <rect x="-2" y="17" width="4" height="8" fill="white"/>
            <rect x="17" y="-2" width="8" height="4" fill="white"/>
            <rect x="-25" y="-2" width="8" height="4" fill="white"/>
            <!-- Diagonal teeth -->
            <rect x="14" y="-16" width="6" height="4" fill="white" transform="rotate(45)"/>
            <rect x="14" y="12" width="6" height="4" fill="white" transform="rotate(45)"/>
            <rect x="-20" y="-16" width="6" height="4" fill="white" transform="rotate(-45)"/>
            <rect x="-20" y="12" width="6" height="4" fill="white" transform="rotate(-45)"/>
        </g>

        <!-- Smaller gear -->
        <g transform="translate(25, -25)">
            <circle cx="0" cy="0" r="12" fill="white"/>
            <circle cx="0" cy="0" r="5" fill="url(#automationGradient)"/>
            <!-- Small gear teeth -->
            <rect x="-1.5" y="-15" width="3" height="5" fill="white"/>
            <rect x="-1.5" y="10" width="3" height="5" fill="white"/>
            <rect x="10" y="-1.5" width="5" height="3" fill="white"/>
            <rect x="-15" y="-1.5" width="5" height="3" fill="white"/>
        </g>
    </g>

    <!-- Bottom text -->
    <text x="60" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">AUTOMATION</text>
</svg>
