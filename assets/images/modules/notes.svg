<svg width="120" height="120" viewBox="0 0 120 120"
    xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="notesGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#198754;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#20c997;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background circle -->
    <circle cx="60" cy="60" r="55" fill="url(#notesGradient)" stroke="#fff" stroke-width="3"/>

    <!-- Document/notes icon -->
    <g transform="translate(60, 60)">
        <!-- Main document -->
        <rect x="-18" y="-25" width="28" height="35" rx="3" fill="white"/>
        <!-- Folded corner -->
        <path d="M10 -25 L10 -15 L20 -15 Z" fill="url(#notesGradient)"/>

        <!-- Text lines -->
        <rect x="-12" y="-18" width="15" height="2" rx="1" fill="url(#notesGradient)"/>
        <rect x="-12" y="-12" width="20" height="2" rx="1" fill="url(#notesGradient)"/>
        <rect x="-12" y="-6" width="18" height="2" rx="1" fill="url(#notesGradient)"/>
        <rect x="-12" y="0" width="16" height="2" rx="1" fill="url(#notesGradient)"/>

        <!-- Smaller document behind -->
        <rect x="-25" y="-18" width="22" height="28" rx="2" fill="rgba(255,255,255,0.7)"/>

        <!-- Pen/pencil -->
        <g transform="translate(15, 15) rotate(45)">
            <rect x="-1" y="-12" width="2" height="20" fill="#ffc107"/>
            <polygon points="-2,-12 2,-12 1,-15" fill="#fd7e14"/>
            <rect x="-1.5" y="6" width="3" height="3" fill="#dc3545"/>
        </g>
    </g>

    <!-- Bottom text -->
    <text x="60" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">NOTES</text>
</svg>
