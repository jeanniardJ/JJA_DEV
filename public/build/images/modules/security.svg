<svg width="120" height="120" viewBox="0 0 120 120"
    xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="securityGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#dc3545;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#fd7e14;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background circle -->
    <circle cx="60" cy="60" r="55" fill="url(#securityGradient)" stroke="#fff" stroke-width="3"/>

    <!-- Shield icon -->
    <g transform="translate(60, 60)">
        <path d="M0 -35 L20 -25 L20 0 Q20 15, 0 25 Q-20 15, -20 0 L-20 -25 Z" fill="white" stroke="none"/>
        <!-- Lock inside shield -->
        <rect x="-8" y="-10" width="16" height="12" rx="2" fill="url(#securityGradient)"/>
        <rect x="-6" y="-15" width="12" height="8" rx="6" fill="none" stroke="url(#securityGradient)" stroke-width="2"/>
        <!-- Key hole -->
        <circle cx="0" cy="-6" r="2" fill="white"/>
        <rect x="-1" y="-6" width="2" height="4" fill="white"/>
    </g>

    <!-- Bottom text -->
    <text x="60" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">SECURITY</text>
</svg>
