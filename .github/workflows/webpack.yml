name: CI/CD Pipeline (Tests + Production Deployment)
on:
    push:
        branches: [master, main, develop]
    pull_request:
        branches: [master, main, develop]

env:
    NODE_VERSION: "18"
    PHP_VERSION: "8.2"

jobs:
    tests:
        name: Tests & Quality Check
        runs-on: ubuntu-latest
        # Exécuter les tests sur toutes les branches et événements

        strategy:
            matrix:
                node-version: [18.x]

        steps:
            - uses: actions/checkout@v4
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4.4.0
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ env.PHP_VERSION }}
                  extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql

            - name: Cache Node modules
              uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-

            - name: Cache Composer packages
              uses: actions/cache@v4
              with:
                  path: vendor
                  key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-composer-

            - name: Install dependencies
              run: |
                  npm install
                  composer install --prefer-dist --no-progress --no-suggest

            - name: Build assets for testing
              run: npm run build

            - name: Run tests
              run: |
                  php bin/console cache:clear --env=test
                  php bin/phpunit

            - name: Code quality analysis
              run: |
                  vendor/bin/phpstan analyse --error-format=github
                  vendor/bin/phpcs src/ --standard=PSR12

            - name: Display test results summary
              run: |
                  echo "🧪 Tests completed for branch: ${{ github.ref_name }}"
                  echo "📊 Event: ${{ github.event_name }}"
                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                    echo "🔄 Pull Request validation passed"
                  else
                    echo "📤 Push validation passed"
                  fi

    build-and-push-assets:
        name: Build Assets & Push to Repository (Production Only)
        runs-on: ubuntu-latest
        needs: tests
        # Uniquement pour les push vers master/main (production)
        if: |
            github.event_name == 'push' &&
            (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

        strategy:
            matrix:
                node-version: [18.x]

        steps:
            - uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4.4.0
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Cache Node modules
              uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-

            - name: Install dependencies
              run: npm install

            - name: Build production assets
              run: npm run build

            - name: Configure Git for commit
              run: |
                  git config --global user.name "GitHub Actions"
                  git config --global user.email "actions@github.com"

            - name: Commit compiled assets
              run: |
                  git add public/build/
                  if git diff --staged --quiet; then
                    echo "📦 Aucun changement dans les assets"
                  else
                    git commit -m "chore: update compiled assets for OVH production [skip ci]"
                    git push origin master
                    echo "📦 Assets compilés et pushés vers master pour OVH"
                  fi

            - name: Deploy summary
              run: |
                  echo "🚀 Assets compiled and pushed for OVH Web Hosting!"
                  echo "📊 Build stats:"
                  du -sh public/build/ || echo "Build directory created"
                  echo "📝 Files in build directory:"
                  ls -la public/build/ | head -10
                  echo ""
                  echo "🏗️ OVH Deployment Process:"
                  echo "1. ✅ Assets compiled by GitHub Actions"
                  echo "2. ✅ Assets pushed to master branch"
                  echo "3. 🔄 OVH will pull code + assets with git"
                  echo "4. 🔄 OVH will run: composer install (PHP only)"
                  echo "5. 🔄 OVH will clear Symfony cache"
                  echo "6. ✅ No npm/node commands needed on OVH!"
            - name: Notify success
              run: |
                  echo "🎉 Assets successfully built and pushed to master branch!"
                  echo "📦 Assets are ready for OVH deployment."
                  echo "🚀 Deployment process is streamlined and efficient."
                  echo "🔄 No manual steps required on OVH!"
