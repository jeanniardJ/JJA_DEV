# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
    - package-ecosystem: "composer" # Gestionnaire de dépendances pour Symfony
      directory: "/" # Emplacement des fichiers composer.json
      schedule:
          interval: "daily" # Vérification quotidienne des mises à jour
      labels:
          - "dependencies"
          - "symfony"
      target-branch: "develop"
      ignore:
          - dependency-name: "symfony/*"
            versions: ["<6.0"] # Ignorer les versions inférieures à Symfony 6.0
    - package-ecosystem: "github-actions" # Actions GitHub
      directory: "/" # Emplacement des workflows GitHub Actions
      schedule:
          interval: "daily"
      labels:
          - "dependencies"
          - "ci"
      target-branch: "develop"
    - package-ecosystem: "npm" # Gestionnaire de dépendances pour les assets
      directory: "/" # Emplacement des fichiers package.json
      schedule:
          interval: "daily"
      labels:
          - "dependencies"
          - "frontend"
      target-branch: "develop"
