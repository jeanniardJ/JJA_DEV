# .symfony.local.yaml
# The Symfony Local Server configuration file
http:
    xdebug: true
    # xdebug: false
    use_gzip: true # Toggle GZIP compression

workers:
    docker_compose_up:
        cmd: ["docker-compose", "-p", "jja_dev", "--profile", "jja_dev", "up", "-d", "--build"]

    npm_encore_watch:
        cmd: ["npx", "encore", "dev", "--watch"]

    messenger_consume_async: ~
