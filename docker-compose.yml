    #         XDEBUG_MODE: 'debug'
    #         XDEBUG_CONFIG: 'client_host=host.docker.internal'
    #         PHP_IDE_CONFIG: 'serverName=JJA_DEV'
    #         APACHE_DOCUMENT_ROOT: '/var/www/html/public'
    #     depends_on:
    #         - database
    #     build:
    #         context: .
    #         dockerfile: Dockerfile

    mailer:
        profiles:
            - 'jja_dev'
        image: schickling/mailcatcher
        ports:
            - '1025:1025'
            - '1080:1080'

volumes:
    ###> doctrine/doctrine-bundle ###
    database_data:
    ###< doctrine/doctrine-bundle ###
